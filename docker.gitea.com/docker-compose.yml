version: "3"

networks:
  gitea:
    external: false

services:
  server:
    image: docker.gitea.com/gitea:1.25.4
    container_name: gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=db:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=${DB_USER}
      - GITEA__database__PASSWD=${DB_PASSWORD}
      - GITEA__migrations__ALLOWED_DOMAINS=${ALLOWED_DOMAINS}
      - GITEA__migrations__ALLOW_LOCALNETWORKS=true
    restart: always
    networks:
      - gitea
    volumes:
      - /docker/data/gitea:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "1030:3000"
#      - "222:22" needed for worker nodes
    depends_on:
      - db

 gitea-runner:
    image: gitea/act_runner:latest
    container_name: gitea-runner
    restart: unless-stopped
    environment:
      GITEA_INSTANCE_URL:
      GITEA_RUNNER_REGISTRATION_TOKEN: ""
      GITEA_RUNNER_NAME: ""
      GITEA_RUNNER_LABELS: "ubuntu-latest:docker://node:20-bookworm"
    volumes:
      - /docker/data/gitea-runner-data:/data
      - /var/run/docker.sock:/var/run/docker.sock

  db:
    image: docker.io/library/postgres:14
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=gitea
    networks:
      - gitea
    volumes:
      - /docker/data/gitea/postgres:/var/lib/postgresql/data
